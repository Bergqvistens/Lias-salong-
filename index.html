/* ---------- Tidshjälpare (lediga tider) ---------- */
const localDate = (d) =>
  d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
const toMin = (t) => {
  const [a, b] = t.split(":").map(Number);
  return a * 60 + b;
};
const fmtT = (m) => String(Math.floor(m / 60)).padStart(2, "0") + ":" + String(m % 60).padStart(2, "0");
const DAYS_SHORT = ["Sön", "Mån", "Tis", "Ons", "Tor", "Fre", "Lör"];
function genSlots(dateStr, dur, bookings, schema, step) {
  const d = new Date(dateStr + "T12:00:00");
  const day = schema[d.getDay()];
  if (!day || day.closed || !dur) return [];
  const open = toMin(day.open);
  const close = toMin(day.close);
  const busy = bookings
    .filter((b) => b.date === dateStr && b.start && b.duration)
    .map((b) => [toMin(b.start), toMin(b.start) + Number(b.duration)]);
  const now = new Date();
  const isToday = dateStr === localDate(now);
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const out = [];
  for (let t = open; t + dur <= close; t += step) {
    if (isToday && t < nowMin + 30) continue;
    if (busy.some(([a, b]) => t < b && t + dur > a)) continue;
    out.push(fmtT(t));
  }
  return out;
}

/* ============================================================
   KUND · FRISÖRBOKNING (tjänst → tillval → dag & tid → uppgifter)
   ============================================================ */
function FrisorView({ s, up, addBooking, toast }) {
  const F = s.settings.frisor;
  const [step, setStep] = useState(1);
  const [catId, setCatId] = useState(null);
  const [len, setLen] = useState(null);
  const [adds, setAdds] = useState([]);
  const [date, setDate] = useState(null);
  const [start, setStart] = useState("");
  const [name, setName] = useState(s.saveInfo ? s.myInfo.name : "");
  const [phone, setPhone] = useState(s.saveInfo ? s.myInfo.phone : "");
  const [comment, setComment] = useState("");
  const [sent, setSent] = useState(null);

  const cat = F.categories.find((c) => c.id === catId);
  const addon = (n) => (cat ? cat.addons.find((x) => x.name === n) : null) || {};
  const dur = cat && len ? (cat.base[len] || 0) + adds.reduce((a, n) => a + (addon(n).min || 0), 0) : 0;
  const price = cat && len ? (cat.price[len] || 0) + adds.reduce((a, n) => a + (addon(n).price || 0), 0) : 0;

  const days = [];
  for (let i = 0; i < 21 && days.length < 10; i++) {
    const d = new Date();
    d.setDate(d.getDate() + i);
    const sc = F.schema[d.getDay()];
    if (sc && !sc.closed)
      days.push({ ds: localDate(d), label: DAYS_SHORT[d.getDay()] + " " + d.getDate() + "/" + (d.getMonth() + 1) });
  }
  const slots = date ? genSlots(date, dur, s.bookings, F.schema, F.slotStep || 15) : [];

  const pickCat = (id) => {
    setCatId(id);
    setLen(null);
    setAdds([]);
    setDate(null);
    setStart("");
    const c = F.categories.find((x) => x.id === id);
    const keys = Object.keys(c.base);
    if (keys.length === 1) setLen(keys[0]);
  };
  const togg = (n) => {
    setAdds(adds.includes(n) ? adds.filter((x) => x !== n) : [...adds, n]);
    setStart("");
  };
  const stepAfter1 = () => setStep(cat.addons.length > 0 ? 2 : 3);
  const backFrom3 = () => setStep(cat.addons.length > 0 ? 2 : 1);

  const StepDots = () => (
    <div style={{ display: "flex", gap: 6, justifyContent: "center", margin: "4px 0 18px" }}>
      {[1, 2, 3, 4].map((i) => (
        <div
          key={i}
          style={{
            width: i === step ? 26 : 8,
            height: 8,
            borderRadius: 999,
            background: i <= step ? "#fff" : "rgba(255,255,255,.45)",
            transition: "width .2s",
          }}
        />
      ))}
    </div>
  );
  const Summary = () =>
    dur > 0 ? (
      <p className="subtl" style={{ fontSize: 13.5, textAlign: "center", marginBottom: 14 }}>
        {cat.name} · {len}
        {adds.length > 0 && " + " + adds.join(", ")} · ca {dur} min · ca {fmtKr(price)}
      </p>
    ) : null;

  if (sent)
    return (
      <div className="lcard lfade" style={{ textAlign: "center", padding: 32 }}>
        <span style={{ color: C.green }}>
          <Ic d={P.check} size={44} />
        </span>
        <h2 style={{ margin: "12px 0 8px" }}>Bokning skickad!</h2>
        <p style={{ fontSize: 14.5, lineHeight: 1.6, color: C.grayLight }}>
          Du önskade <strong>{sent.date} kl {sent.start}</strong> ({sent.dur} min).
          <br />
          Lia bekräftar din tid via telefon eller sms.
        </p>
        <button
          className="lbtn"
          style={{ marginTop: 20 }}
          onClick={() => {
            setSent(null);
            setStep(1);
            setCatId(null);
            setLen(null);
            setAdds([]);
            setDate(null);
            setStart("");
            setComment("");
          }}
        >
          Klar
        </button>
      </div>
    );

  return (
    <div className="lfade">
      <h1 style={{ marginBottom: 4 }}>Boka frisörtid</h1>
      <p className="subtl" style={{ fontSize: 14, marginBottom: 12 }}>
        Välj tjänst så räknar vi ut tiden – och visar bara lediga tider.
      </p>
      <StepDots />
      {step > 1 && <Summary />}

      {step === 1 && (
        <div>
          <h3 style={{ marginBottom: 12 }}>Steg 1 – Vad vill du boka?</h3>
          <div style={{ display: "grid", gap: 12 }}>
            {F.categories.map((c) => (
              <div
                key={c.id}
                className="lcard"
                style={{ border: catId === c.id ? `2px solid ${C.terraDark}` : "2px solid transparent" }}
              >
                <button
                  onClick={() => pickCat(c.id)}
                  style={{
                    background: "none",
                    border: "none",
                    cursor: "pointer",
                    width: "100%",
                    textAlign: "left",
                    display: "flex",
                    alignItems: "center",
                    gap: 12,
                    fontFamily: "'Montserrat',sans-serif",
                    fontWeight: 600,
                    fontSize: 15.5,
                    color: C.brown,
                    padding: 0,
                  }}
                >
                  <span style={{ color: C.terraDark }}>
                    <Ic d={P.cut} />
                  </span>
                  {c.name}
                </button>
                {catId === c.id && (
                  <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginTop: 12 }}>
                    {Object.keys(c.base).map((k) => (
                      <button
                        key={k}
                        className={"lbtn small" + (len === k ? "" : " sec")}
                        onClick={() => {
                          setLen(k);
                          setStart("");
                        }}
                      >
                        {k} · {c.base[k]} min
                      </button>
                    ))}
                  </div>
                )}
              </div>
            ))}
          </div>
          <button className="lbtn" style={{ marginTop: 16, width: "100%" }} disabled={!cat || !len} onClick={stepAfter1}>
            Fortsätt
          </button>
        </div>
      )}

      {step === 2 && cat && (
        <div>
          <button className="lghost" onClick={() => setStep(1)} style={{ marginBottom: 8 }}>
            <Ic d={P.back} size={16} style={{ verticalAlign: -3 }} /> Tillbaka
          </button>
          <h3 style={{ marginBottom: 12 }}>Steg 2 – Tillval</h3>
          <div className="lcard" style={{ display: "grid", gap: 4 }}>
            {cat.addons.map((a) => (
              <label
                key={a.name}
                style={{
                  display: "flex",
                  alignItems: "center",
                  gap: 12,
                  padding: "10px 0",
                  cursor: "pointer",
                  borderBottom: "1px solid #E9DEC8",
                }}
              >
                <input
                  type="checkbox"
                  checked={adds.includes(a.name)}
                  onChange={() => togg(a.name)}
                  style={{ width: 20, height: 20, accentColor: C.terraDark }}
                />
                <span style={{ flex: 1, fontWeight: 600, fontSize: 14.5 }}>{a.name}</span>
                <span style={{ fontSize: 13, color: C.grayLight, whiteSpace: "nowrap" }}>
                  +{a.min} min · +{fmtKr(a.price)}
                </span>
              </label>
            ))}
            <p style={{ fontSize: 13.5, marginTop: 10, fontWeight: 600, color: C.terraDark }}>
              Totalt: ca {dur} min · ca {fmtKr(price)}
            </p>
          </div>
          <button className="lbtn" style={{ marginTop: 16, width: "100%" }} onClick={() => setStep(3)}>
            Fortsätt
          </button>
        </div>
      )}

      {step === 3 && cat && (
        <div>
          <button className="lghost" onClick={backFrom3} style={{ marginBottom: 8 }}>
            <Ic d={P.back} size={16} style={{ verticalAlign: -3 }} /> Tillbaka
          </button>
          <h3 style={{ marginBottom: 12 }}>Steg 3 – Välj dag &amp; tid</h3>
          <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 8 }}>
            {days.map((d) => (
              <button
                key={d.ds}
                className={"lbtn small" + (date === d.ds ? "" : " sec")}
                style={{ whiteSpace: "nowrap", flexShrink: 0 }}
                onClick={() => {
                  setDate(d.ds);
                  setStart("");
                }}
              >
                {d.label}
              </button>
            ))}
          </div>
          <div className="lcard" style={{ marginTop: 10 }}>
            <Field label="Lediga tider">
              <select
                className="linput"
                value={start}
                disabled={!date}
                onChange={(e) => setStart(e.target.value)}
              >
                <option value="">{date ? "Välj tid…" : "Välj dag först…"}</option>
                {slots.map((t) => (
                  <option key={t} value={t}>
                    {t} – {fmtT(toMin(t) + dur)}
                  </option>
                ))}
              </select>
            </Field>
            {date && slots.length === 0 && (
              <p style={{ fontSize: 13.5, color: C.red, marginTop: 8 }}>
                Inga lediga tider den dagen – prova en annan dag.
              </p>
            )}
            <p style={{ fontSize: 13, color: C.grayLight, marginTop: 10 }}>
              Din bokning tar ca {dur} min.
            </p>
          </div>
          <button
            className="lbtn"
            style={{ marginTop: 16, width: "100%" }}
            disabled={!date || !start}
            onClick={() => setStep(4)}
          >
            Fortsätt
          </button>
        </div>
      )}

      {step === 4 && cat && (
        <div className="lcard">
          <button className="lghost" onClick={() => setStep(3)} style={{ marginBottom: 4 }}>
            <Ic d={P.back} size={16} style={{ verticalAlign: -3 }} /> Tillbaka
          </button>
          <h3>Steg 4 – Dina uppgifter</h3>
          <p style={{ fontSize: 13.5, color: C.grayLight, marginTop: 4 }}>
            {date} kl {start} · ca {dur} min · ca {fmtKr(price)}
          </p>
          <Field label="Namn">
            <input className="linput" value={name} onChange={(e) => setName(e.target.value)} placeholder="Ditt namn" />
          </Field>
          <Field label="Telefon">
            <input
              className="linput"
              value={phone}
              onChange={(e) => setPhone(e.target.value)}
              placeholder="07x-xxx xx xx"
              inputMode="tel"
            />
          </Field>
          <Field label="Kommentar (valfritt)">
            <textarea
              className="linput"
              value={comment}
              onChange={(e) => setComment(e.target.value)}
              placeholder="T.ex. önskemål"
            />
          </Field>
          <button
            className="lbtn"
            style={{ marginTop: 16, width: "100%" }}
            disabled={!name.trim() || !phone.trim()}
            onClick={() => {
              addBooking({
                name: name.trim(),
                phone: phone.trim(),
                catName: cat.name,
                length: len,
                addons: adds,
                duration: dur,
                price,
                date,
                start,
                comment: comment.trim(),
              });
              if (s.saveInfo) up({ myInfo: { name: name.trim(), phone: phone.trim() } });
              setSent({ date, start, dur });
            }}
          >
            Skicka bokning
          </button>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   KUND · KERAMIKVERKSTAD (kurser + drop-in)
   ============================================================ */
function KeramikView({ s, up, toast }) {
  const [bookCourse, setBookCourse] = useState(null);
  const [dropDay, setDropDay] = useState(null);
  const [name, setName] = useState(s.saveInfo ? s.myInfo.name : "");
  const [phone, setPhone] = useState(s.saveInfo ? s.myInfo.phone : "");

  const seatsLeft = (c) => c.seats - s.courseSignups.filter((x) => x.courseId === c.id).length;

  const submitCourse = () => {
    up({
      courseSignups: [
        ...s.courseSignups,
        { id: uid(), courseId: bookCourse.id, name: name.trim(), phone: phone.trim(), status: "ny", created: today() },
      ],
      ...(s.saveInfo ? { myInfo: { name: name.trim(), phone: phone.trim() } } : {}),
    });
    setBookCourse(null);
    toast("Anmälan skickad! Lia bekräftar din plats. ✔");
  };
  const submitDrop = () => {
    up({
      dropins: [
        ...s.dropins,
        { id: uid(), day: dropDay, name: name.trim(), phone: phone.trim(), status: "ny", created: today() },
      ],
      ...(s.saveInfo ? { myInfo: { name: name.trim(), phone: phone.trim() } } : {}),
    });
    setDropDay(null);
    toast("Anmälan skickad! Välkommen på drop-in. ✔");
  };

  return (
    <div className="lfade">
      <h1 style={{ marginBottom: 4 }}>Keramikverkstad</h1>
      <p className="subtl" style={{ fontSize: 14, marginBottom: 18 }}>
        Kurser, workshops och drop-in för dig som vill skapa i lera.
      </p>

      <h2 style={{ marginBottom: 12 }}>Kurser</h2>
      <div style={{ display: "grid", gap: 14 }}>
        {s.courses.map((c) => {
          const left = seatsLeft(c);
          return (
            <div key={c.id} className="lcard">
              <div style={{ display: "flex", justifyContent: "space-between", gap: 10, alignItems: "flex-start" }}>
                <div>
                  <h3>{c.name}</h3>
                  <span className="ltag" style={{ marginTop: 6 }}>
                    {c.level}
                  </span>
                </div>
                <strong style={{ whiteSpace: "nowrap", color: C.terraDark }}>{fmtKr(c.price)}</strong>
              </div>
              <p style={{ fontSize: 14, lineHeight: 1.55, margin: "10px 0" }}>{c.desc}</p>
              <p style={{ fontSize: 13.5, color: C.grayLight }}>
                {c.date} · {c.time}
              </p>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 12 }}>
                <span className={"ltag" + (left > 0 ? " ok" : "")}>
                  {left > 0 ? `${left} platser kvar` : "Fullbokad"}
                </span>
                <button className="lbtn small" disabled={left <= 0} onClick={() => setBookCourse(c)}>
                  Boka plats
                </button>
              </div>
            </div>
          );
        })}
        {s.courses.length === 0 && <Empty icon={P.pot} text="Inga kurser inplanerade just nu – titta in snart igen!" />}
      </div>

      <h2 style={{ margin: "26px 0 12px" }}>Drop-in</h2>
      <div className="lcard">
        <p style={{ fontSize: 14, lineHeight: 1.55, marginBottom: 12 }}>
          Kom förbi och dreja eller handbygg utan att boka kurs. Lera och verktyg finns på plats.
        </p>
        {s.settings.dropinTimes.map((d) => (
          <div
            key={d}
            style={{
              display: "flex",
              justifyContent: "space-between",
              alignItems: "center",
              padding: "10px 0",
              borderTop: `1px solid ${C.sandLight}`,
            }}
          >
            <span style={{ fontWeight: 600, fontSize: 14.5 }}>{d}</span>
            <button className="lbtn small sec" onClick={() => setDropDay(d)}>
              Anmäl mig
            </button>
          </div>
        ))}
      </div>

      <Modal open={!!bookCourse} onClose={() => setBookCourse(null)} title={bookCourse ? bookCourse.name : ""}>
        {bookCourse && (
          <div>
            <p style={{ fontSize: 13.5, color: C.grayLight }}>
              {bookCourse.date} · {bookCourse.time} · {fmtKr(bookCourse.price)}
            </p>
            <Field label="Namn">
              <input className="linput" value={name} onChange={(e) => setName(e.target.value)} />
            </Field>
            <Field label="Telefon">
              <input className="linput" value={phone} onChange={(e) => setPhone(e.target.value)} inputMode="tel" />
            </Field>
            <button
              className="lbtn"
              style={{ marginTop: 16, width: "100%" }}
              disabled={!name.trim() || !phone.trim()}
              onClick={submitCourse}
            >
              Boka plats
            </button>
          </div>
        )}
      </Modal>

      <Modal open={!!dropDay} onClose={() => setDropDay(null)} title="Anmälan drop-in">
        <p style={{ fontSize: 13.5, color: C.grayLight }}>{dropDay}</p>
        <Field label="Namn">
          <input className="linput" value={name} onChange={(e) => setName(e.target.value)} />
        </Field>
        <Field label="Telefon">
          <input className="linput" value={phone} onChange={(e) => setPhone(e.target.value)} inputMode="tel" />
        </Field>
        <button
          className="lbtn"
          style={{ marginTop: 16, width: "100%" }}
          disabled={!name.trim() || !phone.trim()}
          onClick={submitDrop}
        >
          Anmäl mig
        </button>
      </Modal>
    </div>
  );
}

function AdminLogin({ open, onClose, s, up }) {
  const [pw, setPw] = useState("");
  const [err, setErr] = useState(false);
  return (
    <Modal open={open} onClose={onClose} title="Adminpanel">
      <p style={{ fontSize: 13.5, color: C.grayLight, marginBottom: 4 }}>
        Endast för Lia. Demoversion – data sparas lokalt i webbläsaren.
      </p>
      <Field label="Lösenord">
        <input
          className="linput"
          type="password"
          value={pw}
          onChange={(e) => {
            setPw(e.target.value);
            setErr(false);
          }}
          onKeyDown={(e) => e.key === "Enter" && tryLogin()}
        />
      </Field>
      {err && <p style={{ color: C.red, fontSize: 13, marginTop: 6 }}>Fel lösenord – försök igen.</p>}
      <button className="lbtn dark" style={{ marginTop: 16, width: "100%" }} onClick={tryLogin}>
        Logga in
      </button>
    </Modal>
  );
  function tryLogin() {
    if (pw === s.settings.adminPw) {
      up({ admin: true, adminView: "dashboard" });
      setPw("");
      onClose();
    } else setErr(true);
  }
}

function StatCard({ label, value, icon }) {
  return (
    <div className="lcard" style={{ display: "flex", alignItems: "center", gap: 14 }}>
      <span
        style={{
          width: 44,
          height: 44,
          borderRadius: 12,
          background: C.white,
          color: C.terraDark,
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          flexShrink: 0,
        }}
      >
        <Ic d={icon} size={22} />
      </span>
      <div>
        <div style={{ fontFamily: "'Montserrat',sans-serif", fontWeight: 700, fontSize: 22 }}>{value}</div>
        <div style={{ fontSize: 12.5, color: C.grayLight }}>{label}</div>
      </div>
    </div>
  );
}
function Bars({ rows, unit }) {
  const max = Math.max(1, ...rows.map((r) => r.v));
  return (
    <div style={{ display: "grid", gap: 10 }}>
      {rows.map((r) => (
        <div key={r.k}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 13, marginBottom: 4 }}>
            <span style={{ fontWeight: 600 }}>{r.k}</span>
            <span style={{ color: C.grayLight }}>
              {unit === "kr" ? fmtKr(r.v) : r.v}
            </span>
          </div>
          <div className="lbar">
            <div style={{ width: (r.v / max) * 100 + "%" }} />
          </div>
        </div>
      ))}
      {rows.length === 0 && <p style={{ fontSize: 13.5, color: C.grayLight }}>Ingen data ännu.</p>}
    </div>
  );
}

                <StatCard label="Produkter i lager" value={s.products.reduce((a, p) => a + p.stock, 0)} icon={P.box} />
              </div>
            </div>
          )}

          {/* ---------- KOMMUNIKATION ---------- */}
          {av === "kommunikation" && (
            <div className="lfade">
              <h1 style={{ marginBottom: 16 }}>Kommunikation</h1>
              <div style={{ display: "grid", gap: 12 }}>
                {s.messages.length === 0 && <Empty icon={P.chat} text="Inga meddelanden ännu." />}
                {[...s.messages].reverse().map((m) => (
                  <div key={m.id} className="lcard" style={{ opacity: m.read ? 0.75 : 1 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", gap: 8 }}>
                      <strong>{m.name}</strong>
                      {!m.read && <span className="ltag new">Ny</span>}
                    </div>
                    <p style={{ fontSize: 13, color: C.grayLight, margin: "4px 0 8px" }}>
                      {m.created} · {m.email || m.phone}
                    </p>
                    <p style={{ fontSize: 14, lineHeight: 1.6 }}>{m.text}</p>
                    <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
                      {m.email && (
                        <a className="lbtn small sec" style={{ textDecoration: "none" }} href={"mailto:" + m.email}>
                          Svara via e-post
                        </a>
                      )}
                      {m.phone && (
                        <a className="lbtn small sec" style={{ textDecoration: "none" }} href={"tel:" + m.phone.replace(/[^\d+]/g, "")}>
                          Ring
                        </a>
                      )}
                      {!m.read && (
                        <button className="lbtn small" onClick={() => up({ messages: s.messages.map((y) => (y.id === m.id ? { ...y, read: true } : y)) })}>
                          Markera läst
                        </button>
                      )}
                      <button className="lbtn small sec" onClick={() => up({ messages: s.messages.filter((y) => y.id !== m.id) })}>
                        Ta bort
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ---------- MARKNADSFÖRING ---------- */}
          {av === "marknadsforing" && <Marketing s={s} toast={toast} />}

          {/* ---------- PRODUKTER ---------- */}
          {av === "produkter" && (
            <div className="lfade">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <h1>Produkter</h1>
                <button
                  className="lbtn small"
                  onClick={() =>
                    setEditProd({ id: null, title: "", price: "", emoji: "🏺", desc: "", size: "", material: "Stengodslera", process: "", stock: 1 })
                  }
                >
                  <Ic d={P.plus} size={15} /> Ny produkt
                </button>
              </div>
              <div style={{ display: "grid", gap: 12 }}>
                {s.products.map((p) => (
                  <div key={p.id} className="lcard" style={{ display: "flex", gap: 12, alignItems: "center", flexWrap: "wrap" }}>
                    <span style={{ fontSize: 30 }}>{p.emoji}</span>
                    <div style={{ flex: 1, minWidth: 140 }}>
                      <strong>{p.title}</strong>
                      <p style={{ fontSize: 13, color: C.grayLight }}>{fmtKr(p.price)}</p>
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                      <button className="lbtn small sec" aria-label="Minska lager" onClick={() => chStock(p, -1)}>
                        −
                      </button>
                      <span style={{ minWidth: 54, textAlign: "center", fontSize: 13.5, fontWeight: 600 }}>{p.stock} st</span>
                      <button className="lbtn small sec" aria-label="Öka lager" onClick={() => chStock(p, 1)}>
                        +
                      </button>
                    </div>
                    <div style={{ display: "flex", gap: 6 }}>
                      <button className="lbtn small sec" onClick={() => setEditProd({ ...p })}>
                        Redigera
                      </button>
                      <button className="lbtn small sec" onClick={() => up({ products: s.products.filter((x) => x.id !== p.id) })}>
                        Ta bort
                      </button>
                    </div>
                  </div>
                ))}
              </div>

              <h2 style={{ margin: "24px 0 10px" }}>Specialbeställningar</h2>
              <div style={{ display: "grid", gap: 12 }}>
                {s.specials.length === 0 && <Empty icon={P.box} text="Inga specialbeställningar ännu." />}
                {[...s.specials].reverse().map((x) => (
                  <div key={x.id} className="lcard">
                    <div style={{ display: "flex", justifyContent: "space-between", gap: 8, flexWrap: "wrap" }}>
                      <strong>{x.name}</strong>
                      <span className={"ltag " + (x.status === "ny" ? "new" : x.status === "klar" ? "ok" : "")}>{x.status}</span>
                    </div>
                    <p style={{ fontSize: 13.5, lineHeight: 1.7, margin: "6px 0" }}>
                      {x.type}
                      {x.size && <> · {x.size}</>}
                      {x.colors && <> · {x.colors}</>}
                      <br />
                      {x.desc && <em>”{x.desc}”</em>}
                      <br />
                      Kontakt: {x.contact} · {x.created}
                    </p>
                    <div style={{ display: "flex", gap: 8 }}>
                      <button
                        className="lbtn small"
                        onClick={() => {
                          const next = x.status === "ny" ? "pågår" : x.status === "pågår" ? "klar" : "ny";
                          up({ specials: s.specials.map((y) => (y.id === x.id ? { ...y, status: next } : y)) });
                        }}
                      >
                        Nästa status
                      </button>
                      <button className="lbtn small sec" onClick={() => up({ specials: s.specials.filter((y) => y.id !== x.id) })}>
                        Ta bort
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ---------- KURSER ---------- */}
          {av === "kurser" && (
            <div className="lfade">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                <h1>Kurser</h1>
                <button
                  className="lbtn small"
                  onClick={() => setEditCourse({ id: null, name: "", level: "Nybörjare", date: today(), time: "", seats: 8, price: "", desc: "" })}
                >
                  <Ic d={P.plus} size={15} /> Ny kurs
                </button>
              </div>
              <div style={{ display: "grid", gap: 12 }}>
                {s.courses.map((c) => {
                  const parts = s.courseSignups.filter((x) => x.courseId === c.id);
                  return (
                    <div key={c.id} className="lcard">
                      <div style={{ display: "flex", justifyContent: "space-between", gap: 8, flexWrap: "wrap" }}>
                        <strong>{c.name}</strong>
                        <span className="ltag">
                          {parts.length}/{c.seats} platser
                        </span>
                      </div>
                      <p style={{ fontSize: 13.5, color: C.grayLight, margin: "4px 0 8px" }}>
                        {c.date} · {c.time} · {fmtKr(c.price)}
                      </p>
                      {parts.length > 0 && (
                        <p style={{ fontSize: 13.5, lineHeight: 1.7, marginBottom: 8 }}>
                          <strong>Deltagare:</strong>{" "}
                          {parts.map((x) => x.name + (x.status === "bekräftad" ? " ✓" : "")).join(", ")}
                        </p>
                      )}
                      <div style={{ display: "flex", gap: 8 }}>
                        <button className="lbtn small sec" onClick={() => setEditCourse({ ...c })}>
                          Redigera
                        </button>
                        <button className="lbtn small sec" onClick={() => up({ courses: s.courses.filter((x) => x.id !== c.id) })}>
                          Ta bort
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* ---------- INSTÄLLNINGAR ---------- */}
          {av === "installningar" && <SettingsView s={s} up={up} toast={toast} />}
        </div>
      </div>

      {/* Redigera / ny kurs */}
      <Modal open={!!editCourse} onClose={() => setEditCourse(null)} title={editCourse && editCourse.id ? "Redigera kurs" : "Ny kurs"}>
        {editCourse && (
          <div>
            <Field label="Namn">
              <input className="linput" value={editCourse.name} onChange={(e) => setEditCourse({ ...editCourse, name: e.target.value })} />
            </Field>
            <div className="lgrid2">
              <Field label="Nivå">
                <select className="linput" value={editCourse.level} onChange={(e) => setEditCourse({ ...editCourse, level: e.target.value })}>
                  {["Nybörjare", "Fortsättning", "Alla nivåer"].map((l) => (
                    <option key={l}>{l}</option>
                  ))}
                </select>
              </Field>
              <Field label="Datum">
                <input className="linput" type="date" value={editCourse.date} onChange={(e) => setEditCourse({ ...editCourse, date: e.target.value })} />
              </Field>
              <Field label="Tid">
                <input className="linput" value={editCourse.time} onChange={(e) => setEditCourse({ ...editCourse, time: e.target.value })} placeholder="18:00–20:30" />
              </Field>
              <Field label="Platser">
                <input className="linput" type="number" min="1" value={editCourse.seats} onChange={(e) => setEditCourse({ ...editCourse, seats: +e.target.value || 1 })} />
              </Field>
            </div>
            <Field label="Pris (kr)">
              <input className="linput" type="number" min="0" value={editCourse.price} onChange={(e) => setEditCourse({ ...editCourse, price: e.target.value })} />
            </Field>
            <Field label="Beskrivning">
              <textarea className="linput" value={editCourse.desc} onChange={(e) => setEditCourse({ ...editCourse, desc: e.target.value })} />
            </Field>
            <button
              className="lbtn"
              style={{ marginTop: 16, width: "100%" }}
              disabled={!editCourse.name.trim() || !editCourse.price}
              onClick={() => {
                const c = { ...editCourse, price: +editCourse.price || 0 };
                up({
                  courses: c.id ? s.courses.map((x) => (x.id === c.id ? c : x)) : [...s.courses, { ...c, id: uid() }],
                });
                setEditCourse(null);
                toast("Kurs sparad ✔");
              }}
            >
              Spara kurs
            </button>
          </div>
        )}
      </Modal>

      {/* Redigera / ny produkt */}
      <Modal open={!!editProd} onClose={() => setEditProd(null)} title={editProd && editProd.id ? "Redigera produkt" : "Ny produkt"}>
        {editProd && (
          <div>
            <Field label="Titel">
              <input className="linput" value={editProd.title} onChange={(e) => setEditProd({ ...editProd, title: e.target.value })} />
            </Field>
            <div className="lgrid2">
              <Field label="Pris (kr)">
                <input className="linput" type="number" min="0" value={editProd.price} onChange={(e) => setEditProd({ ...editProd, price: e.target.value })} />
              </Field>
              <Field label="Symbol (emoji)">
                <input className="linput" value={editProd.emoji} onChange={(e) => setEditProd({ ...editProd, emoji: e.target.value })} />
              </Field>
              <Field label="Lager">
                <input className="linput" type="number" min="0" value={editProd.stock} onChange={(e) => setEditProd({ ...editProd, stock: +e.target.value || 0 })} />
              </Field>
              <Field label="Mått">
                <input className="linput" value={editProd.size} onChange={(e) => setEditProd({ ...editProd, size: e.target.value })} />
              </Field>
            </div>
            <Field label="Kort beskrivning">
              <input className="linput" value={editProd.desc} onChange={(e) => setEditProd({ ...editProd, desc: e.target.value })} />
            </Field>
            <Field label="Material">
              <input className="linput" value={editProd.material} onChange={(e) => setEditProd({ ...editProd, material: e.target.value })} />
            </Field>
            <Field label="Process">
              <textarea className="linput" value={editProd.process} onChange={(e) => setEditProd({ ...editProd, process: e.target.value })} />
            </Field>
            <button
              className="lbtn"
              style={{ marginTop: 16, width: "100%" }}
              disabled={!editProd.title.trim() || !editProd.price}
              onClick={() => {
                const p = { ...editProd, price: +editProd.price || 0 };
                up({
                  products: p.id ? s.products.map((x) => (x.id === p.id ? p : x)) : [...s.products, { ...p, id: uid() }],
                });
                setEditProd(null);
                toast("Produkt sparad ✔");
              }}
            >
              Spara produkt
            </button>
          </div>
        )}
      </Modal>
    </div>
  );

  function chStock(p, d) {
    up({ products: s.products.map((x) => (x.id === p.id ? { ...x, stock: Math.max(0, x.stock + d) } : x)) });
  }
}

/* ============================================================
   ADMIN · MARKNADSFÖRING (reklambladsverktyg)
   ============================================================ */
function Marketing({ s, toast }) {
  const [courseId, setCourseId] = useState(s.courses[0] ? s.courses[0].id : "");
  const c = s.courses.find((x) => x.id === courseId);
  const ct = s.settings.contact;
  const flyer = c
    ? `🏺 ${c.name.toUpperCase()} 🏺\n\n${c.desc}\n\n📅 ${c.date} · ${c.time}\n🎯 Nivå: ${c.level}\n💰 ${fmtKr(
        c.price
      )} · ${c.seats} platser\n\nBoka din plats hos Lias Hantverkeri i Karlskoga!\n📍 ${ct.address}\n📞 ${ct.phone}\n📸 ${ct.instagram}\n\n#keramik #karlskoga #hantverk #drejning`
    : "";
  const copy = () => {
    try {
      navigator.clipboard.writeText(flyer);
      toast("Kopierat! Klistra in i Instagram/Facebook. ✔");
    } catch (e) {
      toast("Markera texten och kopiera manuellt.");
    }
  };
  return (
    <div className="lfade">
      <h1 style={{ marginBottom: 16 }}>Marknadsföring</h1>
      <div className="lcard">
        <h3 style={{ marginBottom: 10 }}>Reklamblad för sociala medier</h3>
        <Field label="Välj kurs">
          <select className="linput" value={courseId} onChange={(e) => setCourseId(e.target.value)}>
            {s.courses.map((x) => (
              <option key={x.id} value={x.id}>
                {x.name}
              </option>
            ))}
          </select>
        </Field>
        {c ? (
          <>
            <div
              style={{
                background: C.white,
                borderRadius: 12,
                padding: 16,
                margin: "14px 0",
                whiteSpace: "pre-wrap",
                fontSize: 13.5,
                lineHeight: 1.7,
              }}
            >
              {flyer}
            </div>
            <button className="lbtn" onClick={copy}>
              Kopiera texten
            </button>
          </>
        ) : (
          <p style={{ fontSize: 14, color: C.grayLight, marginTop: 12 }}>Skapa en kurs först, så kan du göra reklam för den här.</p>
        )}
      </div>
    </div>
  );
}

/* ============================================================
   ADMIN · INSTÄLLNINGAR
   ============================================================ */
function SettingsView({ s, up, toast }) {
  const st = s.settings;
  const setSt = (patch) => up({ settings: { ...st, ...patch } });
  const setFrisor = (patch) => setSt({ frisor: { ...st.frisor, ...patch } });
  const updCat = (id, patch) =>
    setFrisor({ categories: st.frisor.categories.map((c) => (c.id === id ? { ...c, ...patch } : c)) });
  const updAddon = (id, i, patch) => {
    const cat = st.frisor.categories.find((c) => c.id === id);
    updCat(id, { addons: cat.addons.map((a, j) => (j === i ? { ...a, ...patch } : a)) });
  };
  const updDay = (i, patch) =>
    setFrisor({ schema: st.frisor.schema.map((d, j) => (j === i ? { ...d, ...patch } : d)) });
  const [pw, setPw] = useState({ old: "", n1: "", n2: "" });
  const [showGdpr, setShowGdpr] = useState(false);

  const listEdit = (label, key, placeholder) => (
    <div className="lcard" style={{ marginBottom: 14 }}>
      <h3 style={{ marginBottom: 8 }}>{label}</h3>
      {st[key].map((v, i) => (
        <div key={i} style={{ display: "flex", gap: 8, marginBottom: 8 }}>
          <input
            className="linput"
            value={v}
            onChange={(e) => {
              const arr = [...st[key]];
              arr[i] = e.target.value;
              setSt({ [key]: arr });
            }}
          />
          <button className="lbtn small sec" aria-label="Ta bort" onClick={() => setSt({ [key]: st[key].filter((_, j) => j !== i) })}>
            <Ic d={P.x} size={15} />
          </button>
        </div>
      ))}
      <button className="lbtn small sec" onClick={() => setSt({ [key]: [...st[key], placeholder] })}>
        <Ic d={P.plus} size={15} /> Lägg till
      </button>
    </div>
  );

  return (
    <div className="lfade">
      <h1 style={{ marginBottom: 16 }}>Inställningar</h1>

      <div className="lcard" style={{ marginBottom: 14 }}>
        <h3 style={{ marginBottom: 4 }}>Frisör – tider &amp; priser</h3>
        <p style={{ fontSize: 12.5, color: C.grayLight, marginBottom: 6 }}>
          Minuterna styr vilka lediga tider kunden kan välja i bokningen.
        </p>
        {st.frisor.categories.map((cat) => (
          <div key={cat.id} style={{ borderTop: "1px solid #E3D6BC", paddingTop: 12, marginTop: 12 }}>
            <strong style={{ fontSize: 14.5, color: C.brown }}>{cat.name}</strong>
            {Object.keys(cat.base).map((k) => (
              <div key={k} style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 8 }}>
                <span style={{ flex: 1, fontSize: 13.5, minWidth: 90 }}>{k}</span>
                <input
                  className="linput"
                  type="number"
                  min="5"
                  step="5"
                  style={{ maxWidth: 78 }}
                  value={cat.base[k]}
                  onChange={(e) => updCat(cat.id, { base: { ...cat.base, [k]: +e.target.value || 0 } })}
                />
                <span style={{ fontSize: 12 }}>min</span>
                <input
                  className="linput"
                  type="number"
                  min="0"
                  style={{ maxWidth: 88 }}
                  value={cat.price[k]}
                  onChange={(e) => updCat(cat.id, { price: { ...cat.price, [k]: +e.target.value || 0 } })}
                />
                <span style={{ fontSize: 12 }}>kr</span>
              </div>
            ))}
            {cat.addons.map((a, i) => (
              <div key={i} style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 8 }}>
                <input
                  className="linput"
                  style={{ flex: 1, minWidth: 90 }}
                  value={a.name}
                  onChange={(e) => updAddon(cat.id, i, { name: e.target.value })}
                />
                <input
                  className="linput"
                  type="number"
                  min="0"
                  step="5"
                  style={{ maxWidth: 78 }}
                  value={a.min}
                  onChange={(e) => updAddon(cat.id, i, { min: +e.target.value || 0 })}
                />
                <span style={{ fontSize: 12 }}>min</span>
                <input
                  className="linput"
                  type="number"
                  min="0"
                  style={{ maxWidth: 88 }}
                  value={a.price}
                  onChange={(e) => updAddon(cat.id, i, { price: +e.target.value || 0 })}
                />
                <span style={{ fontSize: 12 }}>kr</span>
                <button
                  className="lbtn small sec"
                  aria-label="Ta bort tillval"
                  onClick={() => updCat(cat.id, { addons: cat.addons.filter((_, j) => j !== i) })}
                >
                  <Ic d={P.x} size={15} />
                </button>
              </div>
            ))}
            <button
              className="lbtn small sec"
              style={{ marginTop: 10 }}
              onClick={() => updCat(cat.id, { addons: [...cat.addons, { name: "Nytt tillval", min: 15, price: 150 }] })}
            >
              <Ic d={P.plus} size={15} /> Tillval
            </button>
          </div>
        ))}
      </div>

      <div className="lcard" style={{ marginBottom: 14 }}>
        <h3 style={{ marginBottom: 4 }}>Schema (styr lediga tider)</h3>
        <p style={{ fontSize: 12.5, color: C.grayLight, marginBottom: 6 }}>
          Öppet och stängt per veckodag för frisörbokningen.
        </p>
        {[1, 2, 3, 4, 5, 6, 0].map((i) => {
          const d = st.frisor.schema[i];
          return (
            <div key={i} style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 8, flexWrap: "wrap" }}>
              <span style={{ width: 40, fontSize: 13.5, fontWeight: 600 }}>{DAYS_SHORT[i]}</span>
              <label style={{ fontSize: 12.5, display: "flex", gap: 6, alignItems: "center" }}>
                <input
                  type="checkbox"
                  checked={d.closed}
                  style={{ accentColor: C.terraDark }}
                  onChange={(e) => updDay(i, { closed: e.target.checked })}
                />
                Stängt
              </label>
              {!d.closed && (
                <>
                  <input
                    className="linput"
                    type="time"
                    style={{ maxWidth: 108 }}
                    value={d.open}
                    onChange={(e) => updDay(i, { open: e.target.value })}
                  />
                  –
                  <input
                    className="linput"
                    type="time"
                    style={{ maxWidth: 108 }}
                    value={d.close}
                    onChange={(e) => updDay(i, { close: e.target.value })}
                  />
                </>
              )}
            </div>
          );
        })}
      </div>

      {listEdit("Öppettider", "hours", "Mån–Fre: 09–18")}
      {listEdit("Drop-in-tider (keramik)", "dropinTimes", "Onsdag 17–20")}

      <div className="lcard" style={{ marginBottom: 14 }}>
        <h3 style={{ marginBottom: 8 }}>Kontaktuppgifter</h3>
        {[
          ["address", "Adress"],
          ["phone", "Telefon"],
          ["email", "E-post"],
          ["instagram", "Instagram"],
          ["tiktok", "TikTok"],
          ["facebook", "Facebook"],
        ].map(([k, label]) => (
          <Field key={k} label={label}>
            <input className="linput" value={st.contact[k]} onChange={(e) => setSt({ contact: { ...st.contact, [k]: e.target.value } })} />
          </Field>
        ))}
      </div>

      <div className="lcard" style={{ marginBottom: 14 }}>
        <h3 style={{ marginBottom: 8 }}>Adminkonto</h3>
        <Field label="Nuvarande lösenord">
          <input className="linput" type="password" value={pw.old} onChange={(e) => setPw({ ...pw, old: e.target.value })} />
        </Field>
        <Field label="Nytt lösenord">
          <input className="linput" type="password" value={pw.n1} onChange={(e) => setPw({ ...pw, n1: e.target.value })} />
        </Field>
        <Field label="Upprepa nytt lösenord">
          <input className="linput" type="password" value={pw.n2} onChange={(e) => setPw({ ...pw, n2: e.target.value })} />
        </Field>
        <button
          className="lbtn dark"
          style={{ marginTop: 14 }}
          disabled={!pw.old || !pw.n1 || pw.n1 !== pw.n2}
          onClick={() => {
            if (pw.old !== st.adminPw) return toast("Fel nuvarande lösenord.");
            if (pw.n1.length < 6) return toast("Minst 6 tecken, tack.");
            setSt({ adminPw: pw.n1 });
            setPw({ old: "", n1: "", n2: "" });
            toast("Lösenord uppdaterat ✔");
          }}
        >
          Byt lösenord
        </button>
        <p style={{ fontSize: 12.5, color: C.grayLight, marginTop: 10 }}>
          2FA, kryptering och riktiga konton kräver backend – planeras i skarp version.
        </p>
      </div>

      <div className="lcard" style={{ marginBottom: 14 }}>
        <h3 style={{ marginBottom: 8 }}>GDPR &amp; Cookies</h3>
        <button className="lghost" onClick={() => setShowGdpr(!showGdpr)}>
          {showGdpr ? "Dölj texten" : "Visa texten"}
        </button>
        {showGdpr && <p style={{ fontSize: 13.5, lineHeight: 1.7, marginTop: 8 }}>{GDPR_TEXT}</p>}
      </div>

      <div className="lcard">
        <h3 style={{ marginBottom: 8 }}>Verktyg</h3>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <button
            className="lbtn small sec"
            onClick={() => {
              const tmr = new Date();
              tmr.setDate(tmr.getDate() + 1);
              const demo = {
                bookings: [
                  { id: uid(), name: "Anna Larsson", phone: "070-111 22 33", catName: "Damklippning", length: "Mellanlångt", addons: ["Färgning"], duration: 90, price: 1480, date: localDate(tmr), start: "10:00", comment: "Gärna nära fönstret 😊", status: "ny", created: today() },
                  { id: uid(), name: "Erik Berg", phone: "070-444 55 66", catName: "Herrklippning", length: "Kort hår", addons: [], duration: 20, price: 380, date: today(), start: "14:00", comment: "", status: "bekräftad", confirmedAt: Date.now() - 2 * 864e5, created: today() },
                ],
                courseSignups: [{ id: uid(), courseId: s.courses[0] ? s.courses[0].id : "k1", name: "Maja Ek", phone: "070-777 88 99", status: "bekräftad", confirmedAt: Date.now() - 864e5, created: today() }],
                messages: [{ id: uid(), name: "Sofia Nord", email: "sofia@example.se", phone: "", text: "Hej! Har ni presentkort till keramikkurserna?", created: today(), read: false }],
              };
              up(demo);
              toast("Exempeldata inlagd ✔");
            }}
          >
            Fyll i exempeldata
          </button>
          <button
            className="lbtn small sec"
            onClick={() => {
              up({ bookings: [], courseSignups: [], dropins: [], specials: [], messages: [] });
              toast("Bokningar & meddelanden rensade.");
            }}
          >
            Rensa bokningsdata
          </button>
          <button
            className="lbtn small sec"
            onClick={() => {
              up({ onboarded: false, obStep: 0, gdpr: false, admin: false });
              toast("Onboarding visas igen.");
            }}
          >
            Testa onboarding igen
          </button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   APP-ROT
   ============================================================ */
function App() {
  const [s, setS] = useState(() => {
    const saved = store.load();
    return saved ? { ...initialData, ...saved, settings: { ...initialData.settings, ...(saved.settings || {}), contact: { ...initialData.settings.contact, ...((saved.settings || {}).contact || {}) } } } : initialData;
  });
  const [toastMsg, setToastMsg] = useState("");
  const [loginOpen, setLoginOpen] = useState(false);
  const [privacyOpen, setPrivacyOpen] = useState(false);
  const toastTimer = useRef(null);

  useEffect(() => {
    store.save(s);
  }, [s]);

  const up = (patch) => setS((p) => ({ ...p, ...patch }));
  const toast = (msg) => {
    setToastMsg(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToastMsg(""), 2600);
  };
  const addBooking = (b) => up({ bookings: [...s.bookings, { id: uid(), ...b, status: "ny", created: today() }] });

  const NAVC = [
    ["frisor", "Frisör", P.cut],
    ["keramik", "Keramik", P.pot],
    ["shop", "Shop", P.bag],
    ["omlia", "Om Lia", P.heart],
    ["kontakt", "Kontakt", P.pin],
  ];

  return (
    <div className="lias">
      <style>{CSS}</style>

      {!s.onboarded && <Onboarding s={s} up={up} done={() => up({ onboarded: true })} />}

      {s.admin ? (
        <AdminView s={s} up={up} toast={toast} />
      ) : (
        <>
          {/* Header */}
          <header
            style={{
              background: C.sandLight,
              boxShadow: "0 4px 12px rgba(0,0,0,0.06)",
              position: "sticky",
              top: 0,
              zIndex: 40,
            }}
          >
            <div
              style={{
                maxWidth: 960,
                margin: "0 auto",
                padding: "12px 16px",
                display: "flex",
                alignItems: "center",
                justifyContent: "space-between",
                gap: 12,
              }}
            >
              <button
                onClick={() => up({ view: "frisor" })}
                style={{ background: "none", border: "none", cursor: "pointer", display: "flex", alignItems: "center", gap: 10 }}
              >
                <span
                  style={{
                    width: 38,
                    height: 38,
                    borderRadius: 12,
                    background: C.terra,
                    color: "#fff",
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                  }}
                >
                  <Ic d={P.pot} size={22} />
                </span>
                <span style={{ fontFamily: "'Montserrat',sans-serif", fontWeight: 700, fontSize: 17, color: C.gray }}>
                  Lias Hantverkeri
                </span>
              </button>
              <nav className="topnav" aria-label="Huvudmeny">
                {NAVC.map(([v, t]) => (
                  <button key={v} className={s.view === v ? "on" : ""} onClick={() => up({ view: v })}>
                    {t}
                  </button>
                ))}
              </nav>
            </div>
          </header>

          {/* Innehåll */}
          <main className="onturq" style={{ maxWidth: 960, margin: "0 auto", padding: "20px 16px 110px" }}>
            {s.view === "frisor" && <FrisorView s={s} up={up} addBooking={addBooking} toast={toast} />}
            {s.view === "keramik" && <KeramikView s={s} up={up} toast={toast} />}
            {s.view === "shop" && <ShopView s={s} up={up} toast={toast} />}
            {s.view === "omlia" && <OmLiaView />}
            {s.view === "kontakt" && <KontaktView s={s} up={up} toast={toast} openAdmin={() => setLoginOpen(true)} openPrivacy={() => setPrivacyOpen(true)} />}
          </main>

          {/* Bottenmeny (mobil) */}
          <nav className="bottomnav" aria-label="Huvudmeny">
            {NAVC.map(([v, t, i]) => (
              <button key={v} className={"bnav-btn" + (s.view === v ? " on" : "")} onClick={() => up({ view: v })}>
                <Ic d={i} size={21} />
                {t}
              </button>
            ))}
          </nav>
        </>
      )}

      <AdminLogin open={loginOpen} onClose={() => setLoginOpen(false)} s={s} up={up} />
      <Modal open={privacyOpen} onClose={() => setPrivacyOpen(false)} title="Integritet & cookies">
        {GDPR_POINTS.map(([t, txt]) => (
          <p key={t} style={{ fontSize: 14, lineHeight: 1.65, marginBottom: 10 }}>
            <strong style={{ color: C.brown }}>{t}:</strong> {txt}
          </p>
        ))}
        {s.gdprDate && (
          <p style={{ fontSize: 12.5, color: C.grayLight, marginTop: 6 }}>Du godkände villkoren {s.gdprDate}.</p>
        )}
      </Modal>
      <Toast msg={toastMsg} />
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
